<!DOCTYPE html>
<html>

<head>
<title>Student Login</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding-top:100px;
}

.login-box{
background:white;
width:300px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#0056b3;
color:white;
border:none;
cursor:pointer;
}

</style>

<script>

function login(){

var user=document.getElementById("username").value;
var pass=document.getElementById("password").value;

if(user=="student" && pass=="1234"){
window.location="index.html";
}

else{
alert("Invalid Login");
}

}

</script>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</body>

</html>
